<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rzopierdol Esport - Taktyki CS</title>
  <meta name="description" content="Panel taktyk Counter-Strike dla Rzopierdol Esport." />
  <style>
    :root {
      color-scheme: dark;
      --bg: #090a0f;
      --panel: #11131b;
      --panel-2: #171a24;
      --panel-3: #202431;
      --line: #292e3c;
      --line-strong: #3d4558;
      --text: #f4f6fb;
      --muted: #a6adbd;
      --soft: #737d91;
      --accent: #7b35ff;
      --accent-2: #a375ff;
      --p1: #21c8ad;
      --p2: #3498db;
      --p3: #f1c40f;
      --p4: #a95bc8;
      --p5: #ff7a0f;
      --danger: #ff5e50;
      --radius: 8px;
      --shadow: 0 22px 80px rgba(0, 0, 0, .42);
      --ease: cubic-bezier(.2, .9, .2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(123, 53, 255, .12), transparent 320px),
        radial-gradient(circle at top right, rgba(33, 200, 173, .09), transparent 360px),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }

    button,
    select {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 18px;
      border-right: 1px solid var(--line);
      background: rgba(9, 10, 15, .9);
      backdrop-filter: blur(18px);
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }

    .brand img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #05060a;
      box-shadow: 0 0 0 4px rgba(123, 53, 255, .08);
    }

    .brand strong {
      display: block;
      font-size: 16px;
      line-height: 1.15;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .nav-label {
      margin: 22px 6px 10px;
      color: var(--soft);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .map-list,
    .role-list {
      display: grid;
      gap: 8px;
    }

    .map-button,
    .role-button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      text-align: left;
      transition: transform .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease), color .18s var(--ease);
    }

    .map-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 54px;
      padding: 10px 12px;
    }

    .role-button {
      display: grid;
      gap: 2px;
      min-height: 50px;
      padding: 10px 12px;
    }

    .map-button:hover,
    .role-button:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, .04);
      color: var(--text);
    }

    .map-button.is-active {
      border-color: rgba(123, 53, 255, .58);
      background: rgba(123, 53, 255, .14);
      color: var(--text);
    }

    .role-button.is-active {
      border-color: rgba(33, 200, 173, .52);
      background: rgba(33, 200, 173, .12);
      color: var(--text);
    }

    .map-name,
    .role-name {
      display: block;
      color: inherit;
      font-weight: 850;
      text-transform: uppercase;
    }

    .map-meta,
    .role-meta {
      display: block;
      color: var(--soft);
      font-size: 12px;
    }

    .map-count {
      min-width: 30px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      text-align: center;
    }

    .player-legend {
      display: grid;
      gap: 9px;
      margin-top: 4px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(17, 19, 27, .72);
    }

    .player-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--player-color);
      box-shadow: 0 0 18px color-mix(in srgb, var(--player-color), transparent 58%);
    }

    .main {
      min-width: 0;
      padding: 26px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .mobile-logo {
      display: none;
      width: 42px;
      height: 42px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #05060a;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--p1);
      box-shadow: 0 0 18px rgba(33, 200, 173, .7);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 72px);
      line-height: .96;
      letter-spacing: 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(17, 19, 27, .8);
    }

    .toolbar-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .toolbar-title strong {
      font-size: 14px;
      text-transform: uppercase;
    }

    .toolbar-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      white-space: nowrap;
    }

    .field select {
      min-width: 128px;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #0d0f15;
      color: var(--text);
      outline: none;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 282px;
      gap: 18px;
      align-items: start;
    }

    .content-panel,
    .legend-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(17, 19, 27, .86);
      box-shadow: var(--shadow);
    }

    .content-panel {
      min-width: 0;
      overflow: hidden;
    }

    .map-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding: 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, .035), transparent);
    }

    .map-header h2 {
      margin: 0;
      font-size: 32px;
      line-height: 1;
      text-transform: uppercase;
    }

    .map-header p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 4px 8px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .tag[data-player] {
      border-color: color-mix(in srgb, var(--player-color), transparent 35%);
      color: var(--player-color);
      background: color-mix(in srgb, var(--player-color), transparent 90%);
    }

    .section {
      padding: 18px;
      opacity: 1;
      transform: translateY(0);
      transition: opacity .22s var(--ease), transform .22s var(--ease);
    }

    .section.is-switching {
      opacity: 0;
      transform: translateY(8px);
    }

    .tactic-grid {
      display: grid;
      gap: 12px;
    }

    .tactic-card,
    .image-card,
    .notice {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
    }

    .tactic-card {
      scroll-margin-top: 22px;
      padding: 16px;
      transition: opacity .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease), transform .18s var(--ease);
    }

    .tactic-card:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
    }

    .tactic-card header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .tactic-card h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 9px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1.05fr .95fr 1.45fr;
      gap: 12px;
      margin: 14px 0 16px;
    }

    .summary-box {
      min-height: 116px;
      padding: 14px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, .055), rgba(9, 10, 15, .34));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    .summary-box[data-kind="objective"] {
      border-color: rgba(33, 200, 173, .45);
      background: linear-gradient(180deg, rgba(33, 200, 173, .14), rgba(9, 10, 15, .36));
    }

    .summary-box[data-kind="grenades"] {
      border-color: rgba(241, 196, 15, .42);
      background: linear-gradient(180deg, rgba(241, 196, 15, .12), rgba(9, 10, 15, .36));
    }

    .summary-box[data-kind="play"] {
      border-color: rgba(123, 53, 255, .46);
      background: linear-gradient(180deg, rgba(123, 53, 255, .14), rgba(9, 10, 15, .36));
    }

    .summary-box strong {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .summary-box strong::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 16px rgba(163, 117, 255, .62);
    }

    .summary-box[data-kind="objective"] strong::before {
      background: var(--p1);
      box-shadow: 0 0 16px rgba(33, 200, 173, .7);
    }

    .summary-box[data-kind="grenades"] strong::before {
      background: var(--p3);
      box-shadow: 0 0 16px rgba(241, 196, 15, .68);
    }

    .summary-box p {
      margin: 0;
      color: #edf1f8;
      font-size: 15px;
      font-weight: 620;
      line-height: 1.46;
    }

    .briefing {
      display: grid;
      gap: 8px;
    }

    .player-row {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(9, 10, 15, .34);
      transition: opacity .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease), transform .18s var(--ease);
    }

    .player-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--player-color), transparent 35%);
      background: color-mix(in srgb, var(--player-color), transparent 88%);
      color: var(--player-color);
      font-weight: 900;
    }

    .player-row p {
      margin: 0;
      color: #dce2ee;
      font-size: 14px;
    }

    .c4-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: end;
      width: 42px;
      height: 32px;
      color: #ff4545;
      filter: drop-shadow(0 0 7px rgba(255, 69, 69, .32));
    }

    .c4-icon svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    body[data-highlight="p1"] .player-row:not([data-player="p1"]),
    body[data-highlight="p2"] .player-row:not([data-player="p2"]),
    body[data-highlight="p3"] .player-row:not([data-player="p3"]),
    body[data-highlight="p4"] .player-row:not([data-player="p4"]),
    body[data-highlight="p5"] .player-row:not([data-player="p5"]) {
      opacity: .38;
    }

    body[data-highlight="p1"] .player-row[data-player="p1"],
    body[data-highlight="p2"] .player-row[data-player="p2"],
    body[data-highlight="p3"] .player-row[data-player="p3"],
    body[data-highlight="p4"] .player-row[data-player="p4"],
    body[data-highlight="p5"] .player-row[data-player="p5"] {
      border-color: color-mix(in srgb, var(--player-color), transparent 18%);
      background: color-mix(in srgb, var(--player-color), transparent 89%);
      transform: translateX(2px);
    }

    .image-grid {
      display: grid;
      gap: 14px;
    }

    .image-card {
      overflow: hidden;
    }

    .image-card header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .image-card h3 {
      margin: 0;
      font-size: 18px;
    }

    .image-card button {
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .04);
      cursor: pointer;
      font-weight: 750;
    }

    .image-card button:hover {
      border-color: var(--accent);
      background: rgba(123, 53, 255, .14);
    }

    .image-preview {
      display: block;
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      background: #0c0f15;
      cursor: zoom-in;
    }

    .notice {
      padding: 18px;
      color: var(--muted);
    }

    .notice strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      margin-bottom: 6px;
    }

    .legend-panel {
      position: sticky;
      top: 18px;
      padding: 16px;
    }

    .legend-panel h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .legend-panel p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .legend-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-decoration: none;
      transition: transform .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease), color .18s var(--ease);
    }

    .legend-list a:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: rgba(123, 53, 255, .12);
      color: var(--text);
    }

    .legend-list small {
      color: var(--soft);
      font-size: 11px;
      text-transform: uppercase;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(2, 3, 7, .88);
      backdrop-filter: blur(8px);
    }

    .modal.is-open {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .modal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(9, 10, 15, .92);
    }

    .modal-title {
      font-weight: 850;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
    }

    .modal-actions button {
      min-width: 40px;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--panel-2);
      cursor: pointer;
      font-weight: 850;
    }

    .modal-stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
    }

    .modal-stage.is-dragging {
      cursor: grabbing;
    }

    .modal-stage img {
      position: absolute;
      left: 50%;
      top: 50%;
      max-width: none;
      user-select: none;
      -webkit-user-drag: none;
      transform-origin: center;
      will-change: transform;
    }

    @media (max-width: 1080px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .legend-panel {
        position: relative;
        top: auto;
        order: -1;
      }

      .legend-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 920px) {
      .shell {
        display: block;
      }

      .sidebar {
        position: relative;
        height: auto;
        padding: 14px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: none;
      }

      .nav-label {
        margin-top: 8px;
      }

      .map-list,
      .role-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
        scroll-snap-type: x proximity;
      }

      .map-button,
      .role-button {
        min-width: 210px;
        scroll-snap-align: start;
      }

      .player-legend {
        grid-template-columns: repeat(5, max-content);
        overflow-x: auto;
      }

      .main {
        padding: 18px;
      }

      .mobile-logo {
        display: block;
      }
    }

    @media (max-width: 720px) {
      .toolbar,
      .map-header,
      .tactic-card header,
      .image-card header {
        display: block;
      }

      .field {
        margin-top: 10px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .legend-list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-height: 520px) and (orientation: landscape) {
      .sidebar {
        padding: 10px 14px;
      }

      .main {
        padding: 14px;
      }

      h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body data-highlight="all">
  <div class="shell">
    <aside class="sidebar" aria-label="Nawigacja po taktykach">
      <div class="brand">
        <img src="assets/logo.png" alt="Rzopierdol Esport logo" />
        <div>
          <strong>Rzopierdol Esport</strong>
          <span>CS Strats</span>
        </div>
      </div>

      <div class="nav-label">Mapy</div>
      <nav class="map-list" id="mapList" aria-label="Lista map"></nav>

      <div class="nav-label">Podkategorie</div>
      <nav class="role-list" id="roleList" aria-label="Podkategorie"></nav>

      <div class="nav-label">Kolory pozycji</div>
      <div class="player-legend" aria-label="Legenda graczy">
        <div class="player-chip" style="--player-color: var(--p1)"><span class="dot"></span>P1 Zielony</div>
        <div class="player-chip" style="--player-color: var(--p2)"><span class="dot"></span>P2 Niebieski</div>
        <div class="player-chip" style="--player-color: var(--p3)"><span class="dot"></span>P3 Zolty</div>
        <div class="player-chip" style="--player-color: var(--p4)"><span class="dot"></span>P4 Fioletowy</div>
        <div class="player-chip" style="--player-color: var(--p5)"><span class="dot"></span>P5 Pomaranczowy</div>
      </div>
    </aside>

    <main class="main">
      <section class="topbar">
        <div>
          <div class="eyebrow">Baza taktyk</div>
          <h1>Rzopierdol Esport</h1>
        </div>
        <img class="mobile-logo" src="assets/logo.png" alt="" />
      </section>

      <section class="toolbar" aria-label="Filtry widoku">
        <div class="toolbar-title">
          <strong id="viewLabel">Terro</strong>
          <span id="viewHint">Podswietl gracza, zeby szybciej czytac swoje zadania.</span>
        </div>
        <label class="field">
          Podswietlenie
          <select id="highlightSelect">
            <option value="all">Wszyscy</option>
            <option value="p1">P1 Zielony</option>
            <option value="p2">P2 Niebieski</option>
            <option value="p3">P3 Zolty</option>
            <option value="p4">P4 Fioletowy</option>
            <option value="p5">P5 Pomaranczowy</option>
          </select>
        </label>

              type: "default",
              objective: "Przejac mid i Short/Donut bez wczesnego wyboru site'u, jednoczesnie zatrzymujac push CT.",
              grenades: "P3 smoke Mid. P4 smoke Short/Donut i molotov Cubby. P5 dwa flashe na Top Mid.",
              play: "P2 sam kontroluje A Main, P1 pilnuje agresji B w Ruins, a P3-P5 biora Top Mid. Po zajeciu mida P4 calluje: split A przez Short/Donut, rotacja B albo spokojne utrzymanie kontroli do 40 sekundy.",
              players: {
                p1: "Trzymasz Water/Ruins i karzesz push B. Nie pokazujesz bomby. Po przejeciu mida jestes gotowy na wejscie B lub szybka rotacje A.",
                p2: "Sam kontrolujesz A Main. Nie oddajesz darmowego fraga; twoim zadaniem jest zatrzymac push i utrzymac opcje poznego A.",
                p3: "Smokujesz Mid, grasz AWP i bierzesz pierwszy kontakt po flashu. Po zajeciu Top Mid pilnujesz Window/Snipers Nest.",
                p4: "Smokujesz Short/Donut, palisz Cubby i prowadzisz wejscie na Top Mid. Po informacji z bokow wybierasz koncowy site.",
                p5: "Masz C4 i dwa flashe na Top Mid. Wchodzisz za P4, nie wychodzisz pierwszy i trzymasz bombe z dala od samotnych pojedynkow."
              }
            },
            {
              id: "ancient-split-a",
              title: "6. Split A - Short/Donut & Main",
              type: "full buy",
              objective: "Zlamac A jednoczesnym naciskiem z A Main i Short/Donuta.",
              grenades: "P3 smoke CT Spawn. P4 molotov Short/Donut. P5 smoke Temple i dwa flashe.",
              play: "P1 i P2 czekaja A Main. P3-P5 biora mid, a potem Short/Donut. Gdy grupa Short jest gotowa, spadaja smoke CT i Temple; P4 daje call, obie strony wchodza w tej samej sekundzie.",
              players: {
                p1: "Czekasz A Main i wchodzisz pierwszy dopiero na call P4. Czyscisz Boost, Big Box i lewa strone site'u.",
                p2: "Idziesz z P1 A Main, ale nie zdradzasz ustawienia. Wchodzisz drugi, pilnujesz trade'a i po plancie wracasz kontrolowac A Main.",
                p3: "Pomagasz zajac mid, rzucasz smoke CT Spawn i z AWP odcinasz rotacje. Na site wchodzisz ostatni.",
                p4: "Prowadzisz grupe przez mid do Short/Donuta, palisz bliska pozycje i dajesz call. Wychodzisz pierwszy ze Short na site.",
                p5: "Masz C4, smoke Temple i dwa flashe. Wchodzisz ze Short za P4, plantujesz dla A Main i po plancie cofasz do Short."
              }
            },
            {
              id: "ancient-split-b",
              title: "7. Split B - Ramp & House",
              type: "full buy",
              objective: "Wejsc na B z Ramp i House, zmuszajac kotwice do walki na dwa fronty.",
              grenades: "P2 smoke Long. P3 smoke Mid. P4 molotov Cubby/Lamp Room. P5 smoke Short oraz dwa flashe B.",
              play: "P1 z P2 czekaja w Ruins przy Ramp. P3-P5 przejmuja mid, przechodza przez Pit/Lamp Room do House. Po przygotowaniu P4 daje call; grupa House wychodzi pierwsza, a Ramp rusza pol sekundy pozniej.",
              players: {
                p1: "Czekasz przy Ramp i na call wchodzisz pierwszy z tej strony. Czyscisz Pillar oraz default i szukasz trade'a z P2.",
                p2: "Na poczatku rzucasz smoke Long, potem idziesz z P1 i pilnujesz pusha Ruins. Wchodzisz drugi Ramp, a po plancie cofasz sie i kontrolujesz flanke.",
                p3: "Smokujesz Mid przy zajmowaniu przestrzeni. Z AWP pilnujesz rotacji z Lane/Alley i wchodzisz ostatni z grupy House.",
                p4: "Prowadzisz grupe mid do House, palisz Cubby/Lamp Room i dajesz finalny call. Wychodzisz pierwszy z House.",
                p5: "Masz C4, smokujesz Short i flashujesz B. Wychodzisz z House za P4 i plantujesz tak, by bombe bylo widac z Ramp."
              }
            },
            {
              id: "ancient-fake-a-b",
              title: "8. Fake A - Finish B",
              type: "fake",
              objective: "Wyciagnac rotacje w strone A i Short/Donuta, po czym uderzyc w oslablone B.",
              grenades: "P2 smoke CT Spawn i flash A. P3 smoke Mid. P4 molotov Short/Donut i smoke Long. P5 smoke Short oraz dwa flashe B.",
              play: "P2 robi samotny fake A po zajeciu mida przez P3-P4. P1 czeka cicho w Ruins, P5 przygotowuje granaty B. Po granatach A P2 nie umiera, tylko trzyma rotacje; reszta natychmiast schodzi Tunnel/Water i wykonuje B.",
              players: {
                p1: "Czekasz cicho w Ruins i nie pokazujesz sie przed callem. Po rozpoczeciu fake'u zajmujesz Ramp i wchodzisz pierwszy na B.",
                p2: "Robisz fake A: smoke CT Spawn, flash i kilka kontrolowanych strzalow z A Main. Nie wchodzisz sam; przezywasz i odcinasz powrot CT.",
                p3: "Smokujesz Mid i pokazujesz obecnosc AWP na Top Mid. Po fake'u cofasz przez Tunnel/Water do B i pilnujesz dlugiej rotacji.",
                p4: "Palasz Short/Donut i sprzedajesz split A, potem callujesz rotacje. Przy B rzucasz smoke Long i dolaczasz do P1 jako drugi entry.",
                p5: "Masz C4 i zestaw B. Czekasz poza zasiegiem informacji CT, na call rzucasz smoke Short oraz flashe, wchodzisz trzeci i plantujesz."
              }
            }
          ],
          ct: [],
          map: [
            { id: "ancient-callouts", title: "Mapa Ancient - callouty", image: "assets/maps/ancient-map.png", note: "Kliknij grafike, zeby powiekszyc; scroll/pinch przybliza, a przeciagniecie przesuwa mape." }
          ]
        }
      }
    ];

    const state = {
      map: "cache",
      role: "t"
    };

    const mapList = document.querySelector("#mapList");
    const roleList = document.querySelector("#roleList");
    const contentSection = document.querySelector("#contentSection");
    const legendList = document.querySelector("#legendList");
    const mapTitle = document.querySelector("#mapTitle");
    const mapDescription = document.querySelector("#mapDescription");
    const mapStatus = document.querySelector("#mapStatus");
    const viewLabel = document.querySelector("#viewLabel");
    const viewHint = document.querySelector("#viewHint");
    const highlightSelect = document.querySelector("#highlightSelect");

    const imageModal = document.querySelector("#imageModal");
    const modalStage = document.querySelector("#modalStage");
    const modalImage = document.querySelector("#modalImage");
    const modalTitle = document.querySelector("#modalTitle");
    const modalState = { scale: 1, x: 0, y: 0, dragging: false, startX: 0, startY: 0 };

    function getActiveMap() {
      return strats.find((map) => map.id === state.map) || strats[0];
    }

    function getActiveRole() {
      return roles.find((role) => role.id === state.role) || roles[0];
    }

    function countItems(map) {
      return roles.reduce((total, role) => total + (map.sections[role.id] || []).length, 0);
    }

    function renderMaps() {
      mapList.innerHTML = strats.map((map) => `
        <button class="map-button ${map.id === state.map ? "is-active" : ""}" type="button" data-map="${map.id}">
          <span>
            <span class="map-name">${map.name}</span>
            <span class="map-meta">${map.status}</span>
          </span>
          <span class="map-count">${countItems(map)}</span>
        </button>
      `).join("");
    }

    function renderRoles() {
      const map = getActiveMap();
      roleList.innerHTML = roles.map((role) => {
        const amount = (map.sections[role.id] || []).length;
        return `
          <button class="role-button ${role.id === state.role ? "is-active" : ""}" type="button" data-role="${role.id}">
            <span class="role-name">${role.label}</span>
            <span class="role-meta">${amount} wpisy - ${role.meta}</span>
          </button>
        `;
      }).join("");
    }

    function renderTacticCard(tactic) {
      const c4Holder = tactic.c4Holder || "p5";
      const playerRows = Object.entries(tactic.players).map(([player, text]) => `
        <div class="player-row" data-player="${player}" style="--player-color: ${playerColors[player]}">
          <span class="player-label">${player.toUpperCase()}</span>
          <p>${text}</p>
          ${player === c4Holder ? `
            <span class="c4-icon" title="${player.toUpperCase()} ma C4" aria-label="${player.toUpperCase()} ma C4">
              <svg viewBox="0 0 42 32" aria-hidden="true" focusable="false">
                <path d="M8 7V4h19v3M13 4V2m9 2V2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                <rect x="4" y="7" width="30" height="22" rx="4" fill="currentColor" fill-opacity=".12" stroke="currentColor" stroke-width="1.7" />
                <rect x="9" y="12" width="20" height="11" rx="2" fill="currentColor" fill-opacity=".16" stroke="currentColor" stroke-width="1.3" />
                <text x="19" y="20.5" fill="currentColor" font-size="8.5" font-weight="900" text-anchor="middle">C4</text>
                <path d="M34 12c5-1 3-7 6-8M34 17c6 1 4 7 7 8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
              </svg>
            </span>
          ` : ""}
        </div>
      `).join("");

      return `
        <article class="tactic-card" id="${tactic.id}">
          <header>
            <div>
              <h3>${tactic.title}</h3>
              <div class="card-meta">
                <span class="tag">${tactic.type}</span>
                ${Object.keys(tactic.players).map((player) => `<span class="tag" data-player="${player}" style="--player-color: ${playerColors[player]}">${player.toUpperCase()}</span>`).join("")}
              </div>
            </div>
          </header>
          <div class="summary-grid">
            <div class="summary-box" data-kind="objective"><strong>Cel</strong><p>${tactic.objective}</p></div>
            <div class="summary-box" data-kind="grenades"><strong>Granaty</strong><p>${tactic.grenades}</p></div>
            <div class="summary-box" data-kind="play"><strong>Rozegranie</strong><p>${tactic.play}</p></div>
          </div>
          <div class="briefing">${playerRows}</div>
        </article>
      `;
    }

    function renderImageCard(item) {
      return `
        <article class="image-card" id="${item.id}">
          <header>
            <div>
              <h3>${item.title}</h3>
              <span class="map-meta">${item.note}</span>
            </div>
            <button type="button" data-open-image="${item.image}" data-title="${item.title}">Powieksz</button>
          </header>
          <img class="image-preview" src="${item.image}" alt="${item.title}" data-open-image="${item.image}" data-title="${item.title}" />
        </article>
      `;
    }

    function renderContent() {
      const map = getActiveMap();
      const role = getActiveRole();
      const entries = map.sections[state.role] || [];

      mapTitle.textContent = map.name;
      mapDescription.textContent = map.description;
      mapStatus.textContent = map.status;
      viewLabel.textContent = role.label;
      viewHint.textContent = state.role === "t"
        ? "Wybierz P1-P5, zeby podbic swoje zadania i przygaszac reszte."
        : "Kliknij grafike, potem scroll/pinch do zoomu i przeciaganie do przesuwania.";

      if (!entries.length) {
        const emptyTitle = state.role === "ct" ? "Taktyki CT nie sa jeszcze uzupelnione" : "Brak wpisow w tej sekcji";
        const emptyText = state.role === "ct"
          ? "Ta zakladka zostala celowo pusta. Aktualnie uzupelnione sa tylko taktyki Terro oraz mapa calloutow."
          : "Dla tej podkategorii nie dodano jeszcze tresci.";
        contentSection.innerHTML = `
          <div class="notice">
            <strong>${emptyTitle}</strong>
            <span>${emptyText}</span>
          </div>
        `;
        return;
      }

      if (state.role === "t") {
        contentSection.innerHTML = `<div class="tactic-grid">${entries.map(renderTacticCard).join("")}</div>`;
      } else {
        contentSection.innerHTML = `<div class="image-grid">${entries.map(renderImageCard).join("")}</div>`;
      }
    }

    function renderLegend() {
      const map = getActiveMap();
      const entries = map.sections[state.role] || [];

      if (!entries.length) {
        legendList.innerHTML = `<li><span class="tag">Brak wpisow</span></li>`;
        return;
      }

      legendList.innerHTML = entries.map((entry) => `
        <li>
          <a href="#${entry.id}">
            <span>${entry.title}</span>
            <small>${entry.type || "grafika"}</small>
          </a>
        </li>
      `).join("");
    }

    function render() {
      renderMaps();
      renderRoles();
      renderContent();
      renderLegend();
      document.body.dataset.highlight = highlightSelect.value;
    }

    function switchView(next) {
      contentSection.classList.add("is-switching");
      window.setTimeout(() => {
        Object.assign(state, next);
        render();
        contentSection.classList.remove("is-switching");
      }, 140);
    }

    function applyModalTransform() {
      modalImage.style.transform = `translate(calc(-50% + ${modalState.x}px), calc(-50% + ${modalState.y}px)) scale(${modalState.scale})`;
    }

    function openImage(src, title) {
      modalImage.src = src;
      modalImage.alt = title;
      modalTitle.textContent = title;
      modalState.scale = 1;
      modalState.x = 0;
      modalState.y = 0;
      imageModal.classList.add("is-open");
      imageModal.setAttribute("aria-hidden", "false");
      applyModalTransform();
    }

    function closeImage() {
      imageModal.classList.remove("is-open");
      imageModal.setAttribute("aria-hidden", "true");
      modalImage.src = "";
    }

    function zoomImage(delta) {
      modalState.scale = Math.min(5, Math.max(.45, modalState.scale + delta));
      applyModalTransform();
    }

    document.addEventListener("click", (event) => {
      const mapButton = event.target.closest("[data-map]");
      const roleButton = event.target.closest("[data-role]");
      const imageButton = event.target.closest("[data-open-image]");
      const modalAction = event.target.closest("[data-modal-action]");

      if (mapButton) {
        switchView({ map: mapButton.dataset.map, role: "t" });
      }

      if (roleButton) {
        switchView({ role: roleButton.dataset.role });
      }

      if (imageButton) {
        openImage(imageButton.dataset.openImage, imageButton.dataset.title || "Mapa");
      }

      if (modalAction) {
        const action = modalAction.dataset.modalAction;
        if (action === "close") closeImage();
        if (action === "zoom-in") zoomImage(.25);
        if (action === "zoom-out") zoomImage(-.25);
        if (action === "reset") {
          modalState.scale = 1;
          modalState.x = 0;
          modalState.y = 0;
          applyModalTransform();
        }
      }
    });

    highlightSelect.addEventListener("change", () => {
      document.body.dataset.highlight = highlightSelect.value;
    });

    modalStage.addEventListener("wheel", (event) => {
      if (!imageModal.classList.contains("is-open")) return;
      event.preventDefault();
      zoomImage(event.deltaY > 0 ? -.12 : .12);
    }, { passive: false });

    modalStage.addEventListener("pointerdown", (event) => {
      if (!imageModal.classList.contains("is-open")) return;
      modalState.dragging = true;
      modalState.startX = event.clientX - modalState.x;
      modalState.startY = event.clientY - modalState.y;
      modalStage.classList.add("is-dragging");
      modalStage.setPointerCapture(event.pointerId);
    });

    modalStage.addEventListener("pointermove", (event) => {
      if (!modalState.dragging) return;
      modalState.x = event.clientX - modalState.startX;
      modalState.y = event.clientY - modalState.startY;
      applyModalTransform();
    });

    modalStage.addEventListener("pointerup", (event) => {
      modalState.dragging = false;
      modalStage.classList.remove("is-dragging");
      if (modalStage.hasPointerCapture(event.pointerId)) {
        modalStage.releasePointerCapture(event.pointerId);
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeImage();
    });

    render();
  </script>
</body>
</html>
